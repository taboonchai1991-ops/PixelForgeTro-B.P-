<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PixelForge Pro</title>

    <!-- ✅ PWA Support -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a1a">

    <!-- ✅ iOS Safari Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PixelForge">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="apple-touch-startup-image" href="/splash.png">

    <!-- ✅ Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- ✅ CSS -->
    <link rel="stylesheet" href="style.css">

    <style>
        /* ✅ ระบบแสดงสถานะ (เพิ่มเติม) */
        #imageStatus {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: clamp(0.5rem, 1vw, 0.7rem);
            color: var(--text-secondary);
        }
        #imageStatus span {
            color: var(--holo-cyan);
            font-size: 1.2em;
        }
        #dimensionTag {
            font-size: clamp(0.4rem, 0.8vw, 0.6rem);
            color: var(--text-secondary);
            opacity: 0.7;
            font-family: 'Courier New', monospace;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(0.15rem, 0.5vw, 0.3rem) clamp(0.3rem, 1vw, 0.6rem);
            border-top: 1px solid rgba(225, 255, 255, 0.05);
            margin-top: clamp(0.2rem, 0.6vh, 0.4rem);
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        /* ป้องกัน scroll บนมือถือ */
        .no-scroll {
            overflow: hidden;
            touch-action: none;
        }
    </style>
</head>
<body>

    <!-- ============================================================
    พื้นหลังหลัก (สำหรับฉากหลัง)
    ============================================================ -->
    <div id="gameBackground"></div>

    <!-- ============================================================
    เมนูฉากหลัง (JavaScript จะสร้างเอง)
    ============================================================ -->
    <div id="bgMenu"></div>

    <!-- ============================================================
    MAIN APP CONTAINER
    ============================================================ -->
    <div class="app-container">

        <!-- ============================================================
        HEADER - แถบหัวข้อ
        ============================================================ -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">📸</div>
                <div class="logo-text">
                    <h1>PixelForge Pro</h1>
                    <p>AI Image Editor</p>
                </div>
            </div>
            <div class="header-badges">
                <span class="badge-pro">🚀 PRO</span>
                <span class="status-tag">
                    <span class="dot"></span>
                    <span>ออนไลน์</span>
                </span>
                <button class="secondary" id="uploadBtn" title="อัปโหลดภาพ" style="padding:0.15rem 0.6rem; font-size:clamp(0.5rem,1vw,0.7rem); min-height:28px; min-width:28px;">
                    ⬆️
                </button>
                <button class="secondary" id="exportBtn" title="ดาวน์โหลดภาพ" style="padding:0.15rem 0.6rem; font-size:clamp(0.5rem,1vw,0.7rem); min-height:28px; min-width:28px;">
                    ⬇️
                </button>
                <button class="voice-btn" id="voiceBtn" title="เปิด/ปิดเสียง" style="padding:0.15rem 0.6rem; font-size:clamp(0.5rem,1vw,0.7rem); min-height:28px; min-width:28px;">
                    🔊
                </button>
            </div>
        </header>

        <!-- ============================================================
        CANVAS PANEL - พื้นที่แสดงผลภาพ
        ============================================================ -->
        <section class="canvas-panel">
            <div class="canvas-wrapper" id="canvasWrapper">
                <canvas id="mainCanvas"></canvas>
                <div class="drag-overlay" id="dragOverlay">
                    <div class="icon-big">📸</div>
                    <span>วางไฟล์รูปภาพที่นี่</span>
                    <small style="opacity:0.6;">หรือคลิกปุ่มอัปโหลด</small>
                </div>
            </div>

            <!-- สถานะด้านล่าง canvas -->
            <div class="status-bar">
                <div id="imageStatus">
                    <span>●</span> พร้อมใช้งาน
                </div>
                <div id="dimensionTag">📐 0 × 0</div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </section>

        <!-- ============================================================
        CONTROLS PANEL - แผงควบคุม (Grid Layout)
        ============================================================ -->
        <section class="controls-panel">

            <!-- ✅ การ์ดที่ 1: การปรับแต่งภาพ -->
            <div class="card">
                <div class="card-title">🎨 ปรับแต่ง</div>
                <div class="slider-group">
                    <div class="slider-header">
                        <span>☀️ ความสว่าง</span>
                        <span class="value-badge" id="brightnessVal">0</span>
                    </div>
                    <input type="range" id="brightness" min="-100" max="100" value="0">
                </div>
                <div class="slider-group">
                    <div class="slider-header">
                        <span>🌓 ความคมชัด</span>
                        <span class="value-badge" id="contrastVal">0</span>
                    </div>
                    <input type="range" id="contrast" min="-100" max="100" value="0">
                </div>
                <div class="slider-group">
                    <div class="slider-header">
                        <span>🎨 ความอิ่มสี</span>
                        <span class="value-badge" id="saturationVal">0</span>
                    </div>
                    <input type="range" id="saturation" min="-100" max="100" value="0">
                </div>
                <div class="slider-group">
                    <div class="slider-header">
                        <span>🌫️ เบลอ</span>
                        <span class="value-badge" id="blurVal">0</span>
                    </div>
                    <input type="range" id="blur" min="0" max="20" value="0" step="0.5">
                </div>
            </div>

            <!-- ✅ การ์ดที่ 2: ฟิลเตอร์ -->
            <div class="card">
                <div class="card-title">🎭 ฟิลเตอร์</div>
                <select id="filterSelect">
                    <option value="none">— ไม่ใช้ฟิลเตอร์ —</option>
                    <option value="grayscale">⚫ ขาวดำ</option>
                    <option value="sepia">🟤 ซีเปีย</option>
                    <option value="invert">🔄 กลับสี</option>
                    <option value="vintage">📜 วินเทจ</option>
                    <option value="cool">❄️ โทนเย็น</option>
                    <option value="warm">🔥 โทนอุ่น</option>
                </select>
                <div class="btn-group">
                    <button class="primary" id="applyFilterBtn">✅ ใช้ฟิลเตอร์</button>
                    <button class="secondary" id="removeFilterBtn">🗑️ ลบฟิลเตอร์</button>
                </div>
            </div>

            <!-- ✅ การ์ดที่ 3: การแปลงภาพ -->
            <div class="card">
                <div class="card-title">🔄 แปลงภาพ</div>
                <div class="btn-group">
                    <button class="secondary" id="rotateBtn">↩️ หมุน</button>
                    <button class="secondary" id="flipHorizBtn">↔️ ซ้ายขวา</button>
                    <button class="secondary" id="flipVertBtn">↕️ บนล่าง</button>
                </div>
            </div>

            <!-- ✅ การ์ดที่ 4: การจัดการภาพ -->
            <div class="card">
                <div class="card-title">📂 จัดการ</div>
                <div class="btn-group">
                    <button class="primary" id="uploadBtn2">📤 อัปโหลด</button>
                    <button class="warning" id="exportBtn2">📥 ดาวน์โหลด</button>
                </div>
                <button class="danger" id="removeBgBtn" style="width:100%; margin-top:0.2rem;">
                    ✨ ลบพื้นหลัง
                </button>
            </div>

            <!-- ✅ การ์ดที่ 5: ปุ่มลัด + รีเซ็ต -->
            <div class="card">
                <div class="card-title">⚡ ปุ่มลัด</div>
                <div class="btn-group">
                    <button class="secondary" id="resetAdjustBtn">↩️ รีเซ็ตปรับแต่ง</button>
                    <button class="secondary" id="resetAllBtn">🔄 รีเซ็ตทั้งหมด</button>
                </div>
                <div class="voice-status" id="voiceStatus">
                    🎤 พร้อมฟัง
                </div>
                <small style="font-size:0.4rem; opacity:0.4; margin-top:0.2rem; text-align:center; letter-spacing:0.5px;">
                    ⌨️ ปุ่ม 0-9 สำหรับคำสั่งลัด
                </small>
            </div>

        </section>

    </div><!-- /app-container -->

    <!-- ============================================================
    FLOATING ZOOM (มุมขวาล่าง)
    ============================================================ -->
    <div class="floating-zoom" id="floatingZoom">
        <span class="zoom-label">🔍</span>
        <span class="zoom-value" id="zoomValue">100%</span>
        <button id="zoomInBtn" title="ซูมเข้า">➕</button>
        <button id="zoomOutBtn" title="ซูมออก">➖</button>
        <button id="zoomResetBtn" title="รีเซ็ตซูม">⟲</button>
    </div>

    <!-- ============================================================
    VIDEO GENERATOR CARD (JavaScript จะสร้างเอง)
    ============================================================ -->
    <!-- #videoGeneratorCard ถูกสร้างโดย JavaScript -->

    <!-- ============================================================
    AI CHAT WIDGET (JavaScript จะสร้างเอง)
    ============================================================ -->
    <!-- #ai-chat-widget ถูกสร้างโดย JavaScript -->

    <!-- ============================================================
    SCRIPTS - โหลดตามลำดับ
    ============================================================ -->
    
    <!-- ✅ 1. คำพ้องความหมาย (Synonyms) -->
    <script src="script_synonyms.js"></script>
    
    <!-- ✅ 2. ฟังก์ชันเสริม (UI, เสียง, วิดีโอ, พื้นหลัง) -->
    <script src="script_extra.js"></script>
    
    <!-- ✅ 3. ตรรกะ AI (Commands) -->
    <script src="script_commands.js"></script>
    
    <!-- ✅ 4. ตัวเริ่มต้นหลัก (Chat Widget + Keyboard Shortcuts) -->
    <script src="script_combined_integrated.js"></script>
    
    <!-- ✅ 5. ตัวแก้ไขภาพหลัก (PixelForge) -->
    <script src="script.js"></script>

    <!-- ============================================================
    SERVICE WORKER (PWA - Offline Support)
    ============================================================ -->
    <script>
        if ('serviceWorker' in navigator && !/wv|WebView|; wv\)/i.test(navigator.userAgent)) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('✅ Service Worker registered'))
                    .catch(err => console.warn('❌ Service Worker registration failed:', err));
            });
        }
    </script>

    <!-- ============================================================
    INLINE FIX: ป้องกันการเลื่อนหน้าบนมือถือ (ถ้าจำเป็น)
    ============================================================ -->
    <script>
        (function() {
            // ป้องกันการเลื่อนหน้าเมื่อแตะ Canvas
            const canvas = document.getElementById('mainCanvas');
            const wrapper = document.getElementById('canvasWrapper');
            
            if (canvas) {
                canvas.addEventListener('touchstart', function(e) {
                    if (e.target === canvas || e.target.closest('.canvas-wrapper')) {
                        e.preventDefault();
                    }
                }, { passive: false });
                
                canvas.addEventListener('touchmove', function(e) {
                    if (e.target === canvas || e.target.closest('.canvas-wrapper')) {
                        e.preventDefault();
                    }
                }, { passive: false });
            }
            
            // ป้องกัน gesture zoom บน iOS
            document.addEventListener('gesturestart', function(e) {
                if (e.target.closest('.canvas-wrapper') || e.target.closest('#ai-chat-widget')) {
                    e.preventDefault();
                }
            }, { passive: false });
            
            console.log('✅ Mobile fixes applied');
        })();
    </script>

</body>
</html>
